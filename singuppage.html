<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .outer {
            border: 2px solid black;
            padding: 20px 20px 40px 20px;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #72eae8;
            color: rgb(0, 0, 0);
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .return-link {
            text-align: center;
            margin-top: 10px;
        }
        .return-link a {
            color: #007bff;
            text-decoration: none;
        }
        .return-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="outer">
        <h2>Sign Up</h2>
        <form id="signUpForm">
            <!-- Username field -->
            <input type="text" id="username" placeholder="Username" required>

            <!-- Password field -->
            <input type="password" id="password" placeholder="Password" required>

            <!-- Phone Number field -->
            <input type="tel" id="phno" placeholder="Enter your phone number" pattern="[0-9]{10}" required maxlength="10">

            <button type="submit">Register</button>
        </form>

        <!-- Link to return to the login page -->
        <div class="return-link">
            <p>Already have an account? <a href="index.html">Back to Login</a></p>
        </div>
    </div>

    <script>
        // Form submission event listener
        document.getElementById("signUpForm").addEventListener("submit", function(event) {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();
            let phoneNumber = document.getElementById("phno").value.trim();
            
            // Check if the phone number matches the pattern (exactly 10 digits)
            if (!/^\d{10}$/.test(phoneNumber)) {
                alert("Please enter a valid 10-digit phone number.");
                event.preventDefault(); // Prevent form submission if invalid phone number
                return;
            }
            
            // Validate username and password (basic checks)
            if (username === "" || password === "") {
                alert("Please fill out all fields.");
                event.preventDefault(); // Prevent form submission if any field is empty
                return;
            }

            // If all validations pass, show success message (you can proceed with sending data to a server here)
            alert("Sign-up successful! Welcome " + username);
        });
    </script>
</body>
</html>
